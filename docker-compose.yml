services:
  vibe-trading:
    build: .
    ports:
      - "8899:8899"
    env_file:
      - agent/.env
    volumes:
      - vibe-runs:/app/agent/runs
      - vibe-sessions:/app/agent/sessions
      - vibe-uploads:/app/agent/uploads
      - vibe-swarm:/app/agent/.swarm
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8899/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  vibe-runs:
  vibe-sessions:
  vibe-uploads:
  vibe-swarm:
